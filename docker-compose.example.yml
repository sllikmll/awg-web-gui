services:
  awg-web-gui:
    build:
      context: .
    image: awg-web-gui:latest
    container_name: awg-web-gui
    restart: unless-stopped
    environment:
      AWG_SECRET_KEY: "change-me-long-random-string"
      AWG_DATA_DIR: /data
      PORT: "5173"
    ports:
      - "8095:5173"
    volumes:
      - ./data:/data
      # Optional: mount SSH keys for server access.
      # In GUI use key path like /ssh/id_ed25519
      - ./ssh:/ssh:ro
